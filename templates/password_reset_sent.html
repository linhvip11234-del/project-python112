{% extends "base.html" %}
{% block title %}Đã gửi email{% endblock %}
{% block content %}
<div class="pw-shell">
  <div class="pw-card">
    <div class="pw-icon">📧</div>
    <h2>Kiểm tra hộp thư!</h2>
    <p class="pw-sub">Nếu email tồn tại trong hệ thống, chúng tôi đã gửi một liên kết đặt lại mật khẩu. Hãy kiểm tra cả mục Spam/Thư rác.</p>
    <a class="btn primary pw-btn" href="{% url 'dang_nhap' %}">Quay lại đăng nhập</a>
  </div>
</div>
<style>
  .pw-shell{display:flex;justify-content:center;padding:44px 0 32px}.pw-card{width:100%;max-width:560px;background:#fff;border-radius:28px;padding:36px 30px;box-shadow:0 18px 50px rgba(15,23,42,.08);text-align:center;border:1px solid #eef2f7}.pw-icon{width:76px;height:76px;margin:0 auto 18px;border-radius:999px;background:linear-gradient(135deg,#eefcf3,#eefbf6);display:flex;align-items:center;justify-content:center;font-size:34px}.pw-card h2{font-size:54px;line-height:1.05;margin:0 0 14px;font-family:'Cormorant Garamond',serif;color:#142c63}.pw-sub{max-width:440px;margin:0 auto 24px;color:#667085;font-size:16px;line-height:1.7}.pw-btn{display:block;width:100%;margin-top:14px;text-align:center;padding:14px 18px;border-radius:16px;font-weight:700}
</style>
{% endblock %}
